<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ブロスタ風（拡張版）</title>
<style>
body{margin:0;background:#111;color:#fff;font-family:sans-serif;text-align:center;}
#menu{position:absolute;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#111;gap:10px;}
#game{display:none;position:relative;margin:0 auto;width:420px;height:420px;background:#2ecc71;border:3px solid #fff;overflow:hidden;}
button{padding:10px 20px;font-size:16px;border:none;border-radius:10px;background:#00e5ff;}
select{padding:5px;font-size:16px;}
.player,.enemy{position:absolute;width:22px;height:22px;border-radius:50%;}
.player{background:#00e5ff;}
.enemy{background:#ff4d4d;}
.bullet{position:absolute;width:6px;height:6px;background:yellow;border-radius:50%;}
#stick{position:absolute;bottom:20px;left:20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,0.1);}
#attackBtn{position:absolute;bottom:20px;right:20px;width:80px;height:80px;border-radius:50%;background:#ff5252;}
#ui{margin-top:5px;}
</style>
</head>
<body>

<div id="menu">
  <h2>ブロスタ風ゲーム</h2>
  <label>モード選択</label>
  <select id="mode">
    <option value="battle">バトロワ</option>
    <option value="soccer">サッカー</option>
    <option value="gem">エメラルドハント</option>
  </select>

  <label>キャラ選択</label>
  <select id="char">
    <option value="normal">バランス</option>
    <option value="tank">タンク</option>
    <option value="fast">スピード</option>
  </select>

  <button onclick="startGame()">開始</button>
</div>

<div id="game"></div>
<div id="ui">HP:<span id="hp">100</span></div>

<div id="stick"></div>
<div id="attackBtn"></div>

<script>
const game=document.getElementById("game");
const menu=document.getElementById("menu");
const hpText=document.getElementById("hp");

let player,enemies,bullets,mode,charType;

function startGame(){
 mode=document.getElementById("mode").value;
 charType=document.getElementById("char").value;
 menu.style.display="none";
 game.style.display="block";
 init();
}

function init(){
 game.innerHTML="";
 bullets=[];

 // キャラ性能
 let speed=1,hp=100;
 if(charType==="tank"){hp=150; speed=0.7;}
 if(charType==="fast"){hp=80; speed=1.5;}

 player={x:200,y:200,hp,speed,el:null};
 createPlayer();
 createEnemies();
 update();
}

function createPlayer(){
 let el=document.createElement("div"); el.className="player";
 game.appendChild(el); player.el=el;
}

function createEnemies(){
 enemies=[];
 for(let i=0;i<10;i++){
  let el=document.createElement("div"); el.className="enemy";
  enemies.push({x:Math.random()*380,y:Math.random()*380,hp:40,speed:0.5,el});
  game.appendChild(el);
 }
}

// エイム（近い敵を狙う）
function getNearestEnemy(){
 let min=9999,target=null;
 enemies.forEach(e=>{
  let d=Math.hypot(player.x-e.x,player.y-e.y);
  if(d<min){min=d;target=e;}
 });
 return target;
}

function shoot(){
 let target=getNearestEnemy();
 if(!target)return;
 let angle=Math.atan2(target.y-player.y,target.x-player.x);
 let el=document.createElement("div"); el.className="bullet";
 game.appendChild(el);
 bullets.push({x:player.x,y:player.y,dx:Math.cos(angle)*6,dy:Math.sin(angle)*6,el});
}

function update(){
 player.el.style.left=player.x+"px";
 player.el.style.top=player.y+"px";

 enemies.forEach((e,ei)=>{
  let dx=player.x-e.x,dy=player.y-e.y,d=Math.hypot(dx,dy);
  e.x+=dx/d*e.speed;
  e.y+=dy/d*e.speed;
  if(d<15) player.hp-=0.2;
  if(e.hp<=0){game.removeChild(e.el);enemies.splice(ei,1);} 
  e.el.style.left=e.x+"px"; e.el.style.top=e.y+"px";
 });

 bullets.forEach((b,bi)=>{
  b.x+=b.dx; b.y+=b.dy;
  b.el.style.left=b.x+"px"; b.el.style.top=b.y+"px";
  enemies.forEach(e=>{if(Math.hypot(b.x-e.x,b.y-e.y)<10){e.hp-=10;}});
  if(b.x<0||b.x>420||b.y<0||b.y>420){game.removeChild(b.el);bullets.splice(bi,1);} 
 });

 hpText.textContent=Math.floor(player.hp);

 // モード処理
 if(mode==="battle" && enemies.length===0){alert("勝利");location.reload();}
 if(mode==="soccer"){
   // 簡易: 一定時間生存で勝利
 }
 if(mode==="gem"){
   // 簡易: 時間経過で勝利
 }

 if(player.hp<=0){alert("負け");location.reload();}

 requestAnimationFrame(update);
}

// スマホ移動
let stick=document.getElementById("stick");
let dragging=false;
stick.addEventListener("touchstart",()=>dragging=true);
stick.addEventListener("touchend",()=>dragging=false);
stick.addEventListener("touchmove",e=>{
 if(!dragging)return;
 let t=e.touches[0];
 let rect=stick.getBoundingClientRect();
 let dx=t.clientX-(rect.left+50);
 let dy=t.clientY-(rect.top+50);
 player.x+=dx*0.03*player.speed;
 player.y+=dy*0.03*player.speed;
});

// 攻撃
let attackBtn=document.getElementById("attackBtn");
attackBtn.addEventListener("touchstart",shoot);

</script>
</body>
</html>
