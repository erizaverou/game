<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ブロスタ風（最終強化版）</title>
<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;text-align:center;overflow:hidden;}
#menu{position:absolute;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#111;gap:10px;}
#game{display:none;position:relative;width:100vw;height:100vh;background:#2ecc71;overflow:hidden;}
.player,.enemy{position:absolute;width:20px;height:20px;border-radius:50%;}
.player{background:#00e5ff;}
.enemy{background:#ff4d4d;}
.bullet{position:absolute;width:5px;height:5px;background:yellow;border-radius:50%;}
.ball{position:absolute;width:15px;height:15px;background:white;border-radius:50%;}
.gem{position:absolute;width:10px;height:10px;background:#00ffff;border-radius:50%;}
#stick{position:absolute;bottom:20px;left:20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,0.1);}
#attackBtn{position:absolute;bottom:20px;right:20px;width:80px;height:80px;border-radius:50%;background:red;}
</style>
</head>
<body>

<div id="menu">
<h2>モード選択</h2>
<select id="mode">
<option value="battle">バトロワ</option>
<option value="soccer">サッカー</option>
<option value="gem">エメラルド</option>
</select>
<button onclick="startGame()">開始</button>
</div>

<div id="game"></div>
<div id="stick"></div>
<div id="attackBtn"></div>

<script>
const game=document.getElementById("game");
const menu=document.getElementById("menu");

let player,enemies=[],bullets=[],mode;
let ball,gems=[];

function startGame(){
 mode=document.getElementById("mode").value;
 menu.style.display="none";
 game.style.display="block";
 init();
}

function init(){
 game.innerHTML="";
 player={x:0,y:0};
 enemies=[];bullets=[];gems=[];

 for(let i=0;i<10;i++){
  enemies.push({x:Math.random()*2000-1000,y:Math.random()*2000-1000,hp:50});
 }

 if(mode==="soccer"){
  ball={x:0,y:0,el:document.createElement("div")};
  ball.el.className="ball";
  game.appendChild(ball.el);
 }

 if(mode==="gem"){
  setInterval(()=>{
    let g={x:Math.random()*2000-1000,y:Math.random()*2000-1000,el:document.createElement("div")};
    g.el.className="gem";
    game.appendChild(g.el);
    gems.push(g);
  },2000);
 }

 update();
}

function shoot(){
 let targets=[...enemies].sort(()=>Math.random()-0.5); // 分散ターゲット
 let target=targets[0];
 if(!target)return;
 let dx=target.x-player.x,dy=target.y-player.y;
 let d=Math.hypot(dx,dy);
 bullets.push({x:player.x,y:player.y,dx:dx/d*10,dy:dy/d*10});
}

function update(){
 game.innerHTML="";

 // 一人称視点（プレイヤー中心）
 enemies.forEach(e=>{
  let screenX=window.innerWidth/2+(e.x-player.x);
  let screenY=window.innerHeight/2+(e.y-player.y);

  if(Math.abs(screenX-window.innerWidth/2)<500 && Math.abs(screenY-window.innerHeight/2)<500){
    let el=document.createElement("div"); el.className="enemy";
    el.style.left=screenX+"px";
    el.style.top=screenY+"px";
    game.appendChild(el);
  }

  // AI（ランダム＋追尾）
  let dx=player.x-e.x,dy=player.y-e.y;
  let d=Math.hypot(dx,dy);
  if(d<300){e.x+=dx/d*0.5; e.y+=dy/d*0.5;} else {e.x+=Math.random()-0.5; e.y+=Math.random()-0.5;}

  if(d<20) alert("やられた");
 });

 bullets.forEach((b,i)=>{
  b.x+=b.dx; b.y+=b.dy;
  enemies.forEach(e=>{
    if(Math.hypot(b.x-e.x,b.y-e.y)<15){e.hp-=20;}
  });
 });

 enemies=enemies.filter(e=>e.hp>0);

 // サッカー
 if(mode==="soccer" && ball){
  let dx=player.x-ball.x,dy=player.y-ball.y;
  if(Math.hypot(dx,dy)<30){ball.x+=dx*-0.5; ball.y+=dy*-0.5;}
  let el=ball.el;
  el.style.left=window.innerWidth/2+(ball.x-player.x)+"px";
  el.style.top=window.innerHeight/2+(ball.y-player.y)+"px";
 }

 // エメラルド
 if(mode==="gem"){
  gems.forEach((g,i)=>{
    let dx=player.x-g.x,dy=player.y-g.y;
    if(Math.hypot(dx,dy)<30){gems.splice(i,1);} // 回収
    g.el.style.left=window.innerWidth/2+(g.x-player.x)+"px";
    g.el.style.top=window.innerHeight/2+(g.y-player.y)+"px";
  });
 }

 requestAnimationFrame(update);
}

// スマホ移動
let stick=document.getElementById("stick");
let dragging=false;
stick.addEventListener("touchstart",()=>dragging=true);
stick.addEventListener("touchend",()=>dragging=false);
stick.addEventListener("touchmove",e=>{
 if(!dragging)return;
 let t=e.touches[0];
 let rect=stick.getBoundingClientRect();
 let dx=t.clientX-(rect.left+50);
 let dy=t.clientY-(rect.top+50);
 player.x+=dx*0.2;
 player.y+=dy*0.2;
});

// 攻撃
let attackBtn=document.getElementById("attackBtn");
attackBtn.addEventListener("touchstart",shoot);

</script>
</body>
</html>
